version: "3.8"

services:
  # ── Neo4j Graph Database ──────────────────────────────────────
  neo4j:
    image: neo4j:5.12-community
    container_name: osint-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt driver
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-osint_secure_password}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - osint-net

  # ── Tor SOCKS5 Proxy ─────────────────────────────────────────
  tor:
    image: dperson/torproxy:latest
    container_name: osint-tor
    restart: unless-stopped
    ports:
      - "9050:9050"   # SOCKS5
      - "9051:9051"   # Control
    environment:
      - TOR_NewCircuitPeriod=30
    networks:
      - osint-net

  # ── OSINT Application ────────────────────────────────────────
  osint-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osint-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-osint_secure_password}
      - TOR_PROXY_HOST=tor
      - TOR_PROXY_PORT=9050
      - GNN_ENABLED=${GNN_ENABLED:-true}
    volumes:
      - ./data/results:/app/data/results
      - ./data/models:/app/data/models
    depends_on:
      neo4j:
        condition: service_healthy
      tor:
        condition: service_started
    networks:
      - osint-net

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  osint-net:
    driver: bridge
